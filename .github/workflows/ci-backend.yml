name: CI — Backend

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'easy-maintenance-api/**'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'easy-maintenance-api/**'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: easy-maintenance-api
        run: mvn verify --no-transfer-progress -Dspring.profiles.active=test
        env:
          # Variáveis mínimas para os testes unitários compilarem sem contexto Spring real
          SPRING_DATASOURCE_URL: jdbc:h2:mem:testdb
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
          JWT_SECRET: test-secret-key-for-ci-only-not-production
          ASAAS_API_KEY: test-key
          ASAAS_WEBHOOK_TOKEN: test-token
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          BOOTSTRAP_ADMIN_TOKEN: test
          FIREBASE_SERVICE_ACCOUNT_JSON: '{}'

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: easy-maintenance-api/target/site/jacoco/
          retention-days: 7
